<!DOCTYPE html>
<html>
<head>
  <title>ProxyDrop Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>

<div style="position:absolute;top:10px;left:10px;background:white;padding:10px;z-index:1000;">
  <input id="name" placeholder="Nom"><br>
  <input id="lat" placeholder="Latitude"><br>
  <input id="lng" placeholder="Longitude"><br>
  <button onclick="addPoint()">Ajouter</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const SUPABASE_URL = "https://ykoriteyapnsljkhijtl.supabase.co";
const SUPABASE_KEY = "sb_publishable_AyLyVRhY33pADSDyaQQmLA_Ok40lcIt";

const map = L.map('map').setView([50.5, 4.5], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
}).addTo(map);

// Charger les données
fetch(SUPABASE_URL + "/rest/v1/proxy_droppers", {
  headers: {
    apikey: SUPABASE_KEY,
    Authorization: "Bearer " + SUPABASE_KEY
  }
})
.then(res => res.json())
.then(data => {
  data.forEach(item => {
    if(item.latitude && item.longitude){
      L.marker([item.latitude, item.longitude])
        .addTo(map)
        .bindPopup(`
  <b>${item.first_name || ""} ${item.last_name || ""}</b><br>
  📞 ${item.phone || ""}
`);
    }
  });
});
function addPoint(){
  const name = document.getElementById("name").value;
  const lat = parseFloat(document.getElementById("lat").value);
  const lng = parseFloat(document.getElementById("lng").value);

  fetch(SUPABASE_URL + "/rest/v1/proxy_droppers", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    },
    body: JSON.stringify({
      first_name: name,
      latitude: lat,
      longitude: lng
    })
  })
  .then(() => {
    alert("Ajouté !");
    location.reload();
  });
}
</script>

</body>
</html>
